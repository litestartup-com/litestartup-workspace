<!DOCTYPE html>

<body class="min-h-screen">
        <header><!-- header placeholder --></header>

    <main class="mx-auto w-full max-w-6xl px-4 pb-14 pt-8 sm:px-6 sm:pt-12">
        <!--seo:{"title":"中文 Newsletter | LiteStartup","description":"LiteStartup 中文 Newsletter：AI 精选每日科技与商业动态。","keywords":"LiteStartup, 中文简报, 科技新闻, AI资讯","og_title":"LiteStartup 中文 Newsletter | 每日 AI 精选简报","og_description":"每日一封，掌握 AI 与科技创业趋势。精选、精炼、可行动。","og_url":"https://www.litestartup.com/newsletter/zh","og_image":"https://www.litestartup.com/imgs/x.jpg","twitter_title":"LiteStartup 中文 Newsletter","twitter_description":"每日一封，掌握 AI 与科技创业趋势。","canonical":"https://www.litestartup.com/newsletter/zh"}-->
        <section class="mb-10 rounded-3xl border border-black/10 bg-gradient-to-br from-white via-zinc-50 to-zinc-100 p-6 sm:mb-12 sm:p-9">
            <div class="grid gap-8 lg:grid-cols-[1.15fr_0.85fr] lg:items-center">
                <div>
                    <span class="mb-4 inline-flex items-center rounded-full border border-black/10 bg-white px-3 py-1 text-xs font-medium text-black/70">
                        Chinese Edition · 每日更新
                    </span>
                    <h1 class="text-3xl font-bold tracking-tight text-black sm:text-4xl">
                        每日科技与 AI 精选简报
                    </h1>
                    <p class="mt-4 max-w-2xl text-sm leading-7 text-black/70 sm:text-base">
                        LiteStartup 团队与 Agent 每天整理高价值科技动态，帮你在 5 分钟内掌握重点趋势、产品动向与可执行洞察。
                    </p>
                    <div class="mt-6 flex flex-wrap items-center gap-3 text-xs text-black/60 sm:text-sm">
                        <span class="rounded-full bg-black/5 px-3 py-1">AI Curated</span>
                        <span class="rounded-full bg-black/5 px-3 py-1">创业趋势</span>
                        <span class="rounded-full bg-black/5 px-3 py-1">可追溯来源</span>
                    </div>
                </div>

                <aside class="rounded-2xl border border-black/10 bg-white p-5 shadow-sm sm:p-6">
                    <h2 class="text-lg font-semibold text-black">免费订阅中文版</h2>
                    <p class="mt-2 text-sm leading-6 text-black/65">
                        工作日推送，不刷屏。可随时在邮件底部一键取消。
                    </p>
                    <form id="subscribe-form" class="mt-5 space-y-3">
                        <input type="email" id="email" name="email" required placeholder="输入你的邮箱"
                            class="w-full rounded-xl border border-black/15 px-4 py-3 text-sm outline-none transition focus:border-black focus:ring-2 focus:ring-black/10">
                        <input type="text" id="name" name="name" placeholder="姓名（可选）"
                            class="w-full rounded-xl border border-black/15 px-4 py-3 text-sm outline-none transition focus:border-black focus:ring-2 focus:ring-black/10">
                        <button type="submit"
                            class="inline-flex w-full items-center justify-center rounded-xl bg-black px-4 py-3 text-sm font-semibold text-white transition hover:-translate-y-0.5 hover:bg-zinc-800">
                            立即订阅
                        </button>
                    </form>
                    <div id="subscribe-message" class="mt-3 hidden rounded-lg px-3 py-2 text-sm"></div>
                </aside>
            </div>
        </section>

        <section id="list-section">
            <div class="mb-5 flex flex-wrap items-center justify-between gap-3">
                <h2 class="text-2xl font-semibold tracking-tight text-black">往期 Newsletter</h2>
                <div id="loading" class="hidden rounded-full border border-black/10 px-3 py-1 text-xs text-black/60">加载中...</div>
            </div>

            <div id="newsletter-list" class="space-y-3 sm:space-y-4"></div>

            <div id="pagination" class="mt-8 hidden items-center justify-center gap-2 sm:gap-3">
                <button id="prev-page" class="rounded-lg border border-black/15 px-3 py-2 text-sm text-black transition hover:bg-black/5 disabled:cursor-not-allowed disabled:opacity-45">
                    上一页
                </button>
                <span id="page-info" class="text-sm text-black/60"></span>
                <button id="next-page" class="rounded-lg border border-black/15 px-3 py-2 text-sm text-black transition hover:bg-black/5 disabled:cursor-not-allowed disabled:opacity-45">
                    下一页
                </button>
            </div>
        </section>

        <section id="detail-section" class="hidden">
            <button id="back-btn" class="mb-4 inline-flex items-center gap-2 rounded-lg border border-black/15 px-3 py-2 text-sm font-medium text-black transition hover:bg-black hover:text-white">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                返回列表
            </button>
            <article id="detail-content" class="newsletter-content w-full rounded-2xl border border-black/10 bg-white p-5 shadow-sm sm:p-8">
                <!-- Content will be loaded here -->
            </article>
        </section>
    </main>
