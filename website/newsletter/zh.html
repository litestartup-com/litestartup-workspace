    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Space Grotesk', sans-serif; }
        body { background: #ffffff; color: #0a0a0a; }
        .newsletter-content img { max-width: 100%; height: auto; border-radius: 12px; }
        .newsletter-content h1, .newsletter-content h2, .newsletter-content h3 { margin: 1.1em 0 0.55em; font-weight: 700; line-height: 1.3; }
        .newsletter-content p { margin: 0.85em 0; line-height: 1.75; color: #202020; }
        .newsletter-content ul, .newsletter-content ol { margin: 0.85em 0; padding-left: 1.4em; }
        .newsletter-content li { margin: 0.4em 0; line-height: 1.65; }
        .newsletter-content blockquote { border-left: 4px solid #d4d4d8; padding-left: 1em; margin: 1.1em 0; color: #52525b; }
        .newsletter-content a { color: #0f766e; text-decoration: underline; text-underline-offset: 2px; }
        .newsletter-content,
        .newsletter-content > * { width: 100%; max-width: 100%; }
        .newsletter-content .container,
        .newsletter-content main,
        .newsletter-content article,
        .newsletter-content section,
        .newsletter-content .wrapper,
        .newsletter-content [class*="max-w-"] {
            max-width: 100% !important;
            margin-left: 0 !important;
            margin-right: 0 !important;
        }
    </style>
</head>

<body class="min-h-screen">
    <header class="sticky top-0 z-30 border-b border-black/5 bg-white/90 backdrop-blur">
        <div class="mx-auto flex w-full max-w-6xl items-center justify-between px-4 py-4 sm:px-6">
            <a href="/" class="inline-flex items-center gap-2 text-base font-semibold tracking-tight text-black sm:text-lg">
                <span class="inline-flex h-6 w-6 items-center justify-center rounded-md bg-black text-xs font-bold text-white">L</span>
                LiteStartup
            </a>
            <div class="flex items-center gap-2 sm:gap-3">
                <a href="/newsletter/en" class="rounded-lg px-3 py-2 text-xs font-medium text-black/70 transition hover:bg-black/5 hover:text-black sm:text-sm">EN</a>
                <a href="https://app.litestartup.com/signup" class="rounded-lg border border-black/15 px-3 py-2 text-xs font-semibold text-black transition hover:border-black hover:bg-black hover:text-white sm:px-4 sm:text-sm">
                    登录 / 注册
                </a>
            </div>
        </div>
    </header>

    <main class="mx-auto w-full max-w-6xl px-4 pb-14 pt-8 sm:px-6 sm:pt-12">
        <!--seo:{"title":"中文 Newsletter | LiteStartup","description":"LiteStartup 中文 Newsletter：AI 精选每日科技与商业动态。","keywords":"LiteStartup, 中文简报, 科技新闻, AI资讯","og_title":"LiteStartup 中文 Newsletter | 每日 AI 精选简报","og_description":"每日一封，掌握 AI 与科技创业趋势。精选、精炼、可行动。","og_url":"https://www.litestartup.com/newsletter/zh","og_image":"https://www.litestartup.com/imgs/x.jpg","twitter_title":"LiteStartup 中文 Newsletter","twitter_description":"每日一封，掌握 AI 与科技创业趋势。","canonical":"https://www.litestartup.com/newsletter/zh"}-->
        <section class="mb-10 rounded-3xl border border-black/10 bg-gradient-to-br from-white via-zinc-50 to-zinc-100 p-6 sm:mb-12 sm:p-9">
            <div class="grid gap-8 lg:grid-cols-[1.15fr_0.85fr] lg:items-center">
                <div>
                    <span class="mb-4 inline-flex items-center rounded-full border border-black/10 bg-white px-3 py-1 text-xs font-medium text-black/70">
                        Chinese Edition · 每日更新
                    </span>
                    <h1 class="text-3xl font-bold tracking-tight text-black sm:text-4xl">
                        每日科技与 AI 精选简报
                    </h1>
                    <p class="mt-4 max-w-2xl text-sm leading-7 text-black/70 sm:text-base">
                        LiteStartup 团队与 Agent 每天整理高价值科技动态，帮你在 5 分钟内掌握重点趋势、产品动向与可执行洞察。
                    </p>
                    <div class="mt-6 flex flex-wrap items-center gap-3 text-xs text-black/60 sm:text-sm">
                        <span class="rounded-full bg-black/5 px-3 py-1">AI Curated</span>
                        <span class="rounded-full bg-black/5 px-3 py-1">创业趋势</span>
                        <span class="rounded-full bg-black/5 px-3 py-1">可追溯来源</span>
                    </div>
                </div>

                <aside class="rounded-2xl border border-black/10 bg-white p-5 shadow-sm sm:p-6">
                    <h2 class="text-lg font-semibold text-black">免费订阅中文版</h2>
                    <p class="mt-2 text-sm leading-6 text-black/65">
                        工作日推送，不刷屏。可随时在邮件底部一键取消。
                    </p>
                    <form id="subscribe-form" class="mt-5 space-y-3">
                        <input type="email" id="email" name="email" required placeholder="输入你的邮箱"
                            class="w-full rounded-xl border border-black/15 px-4 py-3 text-sm outline-none transition focus:border-black focus:ring-2 focus:ring-black/10">
                        <input type="text" id="name" name="name" placeholder="姓名（可选）"
                            class="w-full rounded-xl border border-black/15 px-4 py-3 text-sm outline-none transition focus:border-black focus:ring-2 focus:ring-black/10">
                        <button type="submit"
                            class="inline-flex w-full items-center justify-center rounded-xl bg-black px-4 py-3 text-sm font-semibold text-white transition hover:-translate-y-0.5 hover:bg-zinc-800">
                            立即订阅
                        </button>
                    </form>
                    <div id="subscribe-message" class="mt-3 hidden rounded-lg px-3 py-2 text-sm"></div>
                </aside>
            </div>
        </section>

        <section id="list-section">
            <div class="mb-5 flex flex-wrap items-center justify-between gap-3">
                <h2 class="text-2xl font-semibold tracking-tight text-black">往期 Newsletter</h2>
                <div id="loading" class="hidden rounded-full border border-black/10 px-3 py-1 text-xs text-black/60">加载中...</div>
            </div>

            <div id="newsletter-list" class="space-y-3 sm:space-y-4"></div>

            <div id="pagination" class="mt-8 hidden items-center justify-center gap-2 sm:gap-3">
                <button id="prev-page" class="rounded-lg border border-black/15 px-3 py-2 text-sm text-black transition hover:bg-black/5 disabled:cursor-not-allowed disabled:opacity-45">
                    上一页
                </button>
                <span id="page-info" class="text-sm text-black/60"></span>
                <button id="next-page" class="rounded-lg border border-black/15 px-3 py-2 text-sm text-black transition hover:bg-black/5 disabled:cursor-not-allowed disabled:opacity-45">
                    下一页
                </button>
            </div>
        </section>

        <section id="detail-section" class="hidden">
            <button id="back-btn" class="mb-4 inline-flex items-center gap-2 rounded-lg border border-black/15 px-3 py-2 text-sm font-medium text-black transition hover:bg-black hover:text-white">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                返回列表
            </button>
            <article id="detail-content" class="newsletter-content w-full rounded-2xl border border-black/10 bg-white p-5 shadow-sm sm:p-8">
                <!-- Content will be loaded here -->
            </article>
        </section>
    </main>

    <footer class="border-t border-black/8 bg-white">
        <div class="mx-auto flex w-full max-w-6xl flex-col items-start justify-between gap-3 px-4 py-6 text-sm text-black/60 sm:flex-row sm:items-center sm:px-6">
            <p>&copy; 2026 LiteStartup. All rights reserved.</p>
            <div class="flex items-center gap-4">
                <a href="/newsletter/en" class="transition hover:text-black">English Edition</a>
                <a href="https://app.litestartup.com/signup" class="transition hover:text-black">Login</a>
            </div>
        </div>
    </footer>

    <script>
        let currentPage = 1;
        const perPage = 20;
        let totalPages = 1;
        const defaultTitle = '中文 Newsletter | LiteStartup';

        const listSection = document.getElementById('list-section');
        const detailSection = document.getElementById('detail-section');
        const newsletterList = document.getElementById('newsletter-list');
        const loading = document.getElementById('loading');
        const pagination = document.getElementById('pagination');
        const prevPage = document.getElementById('prev-page');
        const nextPage = document.getElementById('next-page');
        const pageInfo = document.getElementById('page-info');
        const detailContent = document.getElementById('detail-content');
        const backBtn = document.getElementById('back-btn');
        const subscribeForm = document.getElementById('subscribe-form');
        const subscribeMessage = document.getElementById('subscribe-message');

        const API_BASE = 'https://api.litestartup.com/api';

        async function loadNewsletters(page = 1) {
            loading.classList.remove('hidden');
            pagination.classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE}/newsletters?page=${page}&per_page=${perPage}&language=zh`);
                const result = await response.json();

                if (result.code === 200 && result.data) {
                    renderNewsletterList(result.data.newsletters || []);
                    currentPage = result.data.page || 1;
                    totalPages = Math.max(1, Math.ceil((result.data.total || 0) / perPage));
                    updatePagination();
                } else {
                    newsletterList.innerHTML = '<p class="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600">加载失败，请稍后重试。</p>';
                }
            } catch (error) {
                console.error('Error loading newsletters:', error);
                newsletterList.innerHTML = '<p class="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600">网络异常，暂时无法加载简报。</p>';
            } finally {
                loading.classList.add('hidden');
            }
        }

        function renderNewsletterList(newsletters) {
            if (newsletters.length === 0) {
                newsletterList.innerHTML = '<p class="rounded-xl border border-black/10 bg-zinc-50 px-4 py-3 text-sm text-black/60">暂无简报，欢迎稍后回来查看。</p>';
                return;
            }

            newsletterList.innerHTML = newsletters.map(function (n) {
                const summary = escapeHtml(n.summary || '').trim();
                return `
                    <button type="button" class="group w-full rounded-2xl border border-black/10 bg-white p-4 text-left transition hover:-translate-y-0.5 hover:border-black/20 hover:shadow-md sm:p-5" onclick="showDetail(${n.id})">
                        <div class="flex items-start justify-between gap-3">
                            <div class="min-w-0">
                                <p class="mb-2 inline-flex rounded-full bg-black/5 px-2.5 py-1 text-xs font-medium text-black/60">${formatDate(n.edition)}</p>
                                <h3 class="text-lg font-semibold tracking-tight text-black">${escapeHtml(n.title || '未命名简报')}</h3>
                                <p class="mt-2 text-sm leading-6 text-black/65">${summary || '点击查看完整内容。'}</p>
                            </div>
                            <span class="mt-1 inline-flex h-8 w-8 flex-shrink-0 items-center justify-center rounded-full border border-black/15 text-black/60 transition group-hover:border-black group-hover:text-black">
                                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                                </svg>
                            </span>
                        </div>
                    </button>
                `;
            }).join('');
        }

        function updatePagination() {
            if (totalPages <= 1) {
                pagination.classList.add('hidden');
                return;
            }

            pagination.classList.remove('hidden');
            pagination.classList.add('flex');
            pageInfo.textContent = `第 ${currentPage} / ${totalPages} 页`;
            prevPage.disabled = currentPage <= 1;
            nextPage.disabled = currentPage >= totalPages;
        }

        function renderDetailHtml(rawHtml) {
            if (!rawHtml) {
                detailContent.innerHTML = '<p class="text-sm text-black/55">暂无内容。</p>';
                return;
            }

            const iframeId = 'newsletter-frame';
            detailContent.innerHTML = `<iframe id="${iframeId}" class="block w-full border-0 bg-white" title="newsletter detail"></iframe>`;
            const frame = document.getElementById(iframeId);
            if (!frame) return;

            frame.setAttribute('sandbox', 'allow-same-origin');
            frame.setAttribute('referrerpolicy', 'no-referrer');

            const syncFrameHeight = function () {
                try {
                    const doc = frame.contentDocument;
                    if (!doc) return;
                    const bodyHeight = doc.body ? doc.body.scrollHeight : 0;
                    const htmlHeight = doc.documentElement ? doc.documentElement.scrollHeight : 0;
                    frame.style.height = `${Math.max(bodyHeight, htmlHeight, 520)}px`;
                } catch (error) {
                    frame.style.height = '800px';
                }
            };

            frame.onload = function () {
                syncFrameHeight();
                const doc = frame.contentDocument;
                if (!doc) return;

                const images = Array.from(doc.images || []);
                images.forEach(function (img) {
                    if (!img.complete) {
                        img.addEventListener('load', syncFrameHeight, { once: true });
                    }
                });

                window.setTimeout(syncFrameHeight, 120);
                window.setTimeout(syncFrameHeight, 500);
            };

            frame.srcdoc = String(rawHtml);
        }

        async function showDetail(id) {
            listSection.classList.add('hidden');
            detailSection.classList.remove('hidden');
            detailContent.innerHTML = '<p class="text-sm text-black/55">正在加载内容...</p>';

            try {
                const response = await fetch(`${API_BASE}/newsletters/${id}`);
                const result = await response.json();

                if (result.code === 200 && result.data) {
                    renderDetailHtml(result.data.html_content || '');
                    document.title = `${escapeHtml(result.data.title || 'Newsletter')} | LiteStartup`;
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    detailContent.innerHTML = '<p class="text-sm text-red-600">加载失败，请稍后重试。</p>';
                }
            } catch (error) {
                console.error('Error loading newsletter detail:', error);
                detailContent.innerHTML = '<p class="text-sm text-red-600">网络异常，无法加载简报内容。</p>';
            }
        }

        backBtn.addEventListener('click', function () {
            detailSection.classList.add('hidden');
            listSection.classList.remove('hidden');
            document.title = defaultTitle;
        });

        prevPage.addEventListener('click', function () {
            if (currentPage > 1) {
                loadNewsletters(currentPage - 1);
            }
        });

        nextPage.addEventListener('click', function () {
            if (currentPage < totalPages) {
                loadNewsletters(currentPage + 1);
            }
        });

        subscribeForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const name = document.getElementById('name').value.trim();

            subscribeMessage.classList.add('hidden');
            subscribeMessage.className = 'mt-3 hidden rounded-lg px-3 py-2 text-sm';

            try {
                const response = await fetch(`${API_BASE}/newsletters/subscribe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        name: name || null,
                        edition_key: 'zh_general'
                    })
                });

                const result = await response.json();
                subscribeMessage.classList.remove('hidden');

                if (result.code === 200) {
                    const state = (result.data && result.data.state) || '';
                    subscribeMessage.textContent = state === 'pending_resent'
                        ? '已重新发送确认邮件，请查收你的邮箱以完成订阅。'
                        : '请查收确认邮件，点击邮件中的链接即可完成订阅。';
                    subscribeMessage.className = 'mt-3 rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-700';
                    subscribeForm.reset();
                } else if (result.code === 409) {
                    subscribeMessage.textContent = '你已订阅该简报，无需重复操作。';
                    subscribeMessage.className = 'mt-3 rounded-lg border border-amber-200 bg-amber-50 px-3 py-2 text-sm text-amber-700';
                } else {
                    subscribeMessage.textContent = result.message || '订阅失败，请稍后重试。';
                    subscribeMessage.className = 'mt-3 rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700';
                }
            } catch (error) {
                console.error('Error subscribing:', error);
                subscribeMessage.classList.remove('hidden');
                subscribeMessage.textContent = '网络异常，暂时无法完成订阅。';
                subscribeMessage.className = 'mt-3 rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700';
            }
        });

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        loadNewsletters();
    </script>
</body>

</html>
